<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarefas</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css">

</head>

<body>
  <div class="container">
    <h1>// tarefas</h1>

    <div class="form-box">
      <input id="new-titulo" type="text" placeholder="Título da tarefa" />
      <textarea id="new-desc" placeholder="Descrição (opcional)"></textarea>
      <button class="btn btn-primary" onclick="createTask()">+ Adicionar</button>
    </div>
    <div class="search-bar-container">
      <div class="search-bar">
        <input type="text" name="searchTask" id="searchTask" placeholder="Pesquisar tarefa">
      </div>
      <div class="search-icon-container">
        <button class="search-icon" onclick="loadTasks()">
          <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="100" height="100" viewBox="0 0 50 50">
            <path
              d="M 21 3 C 11.622998 3 4 10.623005 4 20 C 4 29.376995 11.622998 37 21 37 C 24.712383 37 28.139151 35.791079 30.9375 33.765625 L 44.085938 46.914062 L 46.914062 44.085938 L 33.886719 31.058594 C 36.443536 28.083 38 24.223631 38 20 C 38 10.623005 30.377002 3 21 3 z M 21 5 C 29.296122 5 36 11.703883 36 20 C 36 28.296117 29.296122 35 21 35 C 12.703878 35 6 28.296117 6 20 C 6 11.703883 12.703878 5 21 5 z">
            </path>
          </svg>
        </button>
      </div>

    </div>
    <div class="task-list" id="task-list">
      <p class="empty">Carregando...</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>


</body>
<script type="module" src="./src/mains.js"></script>

</html>
